spring.application.name=gns

# Server Configuration
server.servlet.context-path=/api
server.port=8080

# Jackson
spring.jackson.serialization.INDENT_OUTPUT=true

# Active le profil dev par défaut
spring.profiles.active=dev

# JPA Common Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Cloudinary Configuration - Use environment variables
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini Configuration - Use environment variables
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Email Configuration - Use environment variables
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT Configuration - Use environment variables
jwt.jwtSecret=${JWT_SECRET:your-super-secret-jwt-key-change-me-in-production}
jwt.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
