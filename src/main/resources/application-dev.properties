spring.application.name=gns

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/gns_db
spring.datasource.username=postgres
spring.datasource.password=cicero

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server
server.port=8080
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# API
app.api.base-url=/api
app.frontend.url=http://localhost:4200
app.public.urls=/users/**,/api/public/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/api-docs/**,/actuator/health,/actuator/info

# Logging
logging.level.root=INFO
logging.level.com.backend.gns=DEBUG
logging.level.org.springframework.security=DEBUG