# ==========================================
# DÉVELOPPEMENT - Application Configuration
# ==========================================

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gns_dev
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# API Configuration
app.api.base-url=/api
app.frontend.url=http://localhost:3000

# CORS Configuration  
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.backend.gns=DEBUG
logging.level.org.springframework.web=DEBUG
