spring.application.name=gns

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/gns_db
spring.datasource.username=postgres
spring.datasource.password=cicero

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server
server.port=8080
server.servlet.context-path=/api

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# API
app.frontend.url=http://localhost:4200
app.public.urls=/users/**,/api/public/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/api-docs/**,/actuator/health,/actuator/info

# Logging
logging.level.root=INFO
logging.level.com.backend.gns=DEBUG
logging.level.org.springframework.security=DEBUG

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini AI
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# JWT
app.jwt.secret=${JWT_SECRET:a-very-long-and-super-secret-key-for-gns-project-that-is-at-least-512-bits-long-and-should-be-changed-in-production}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Email (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
true
