<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body { font-family: Arial, Helvetica, sans-serif; color: #222; }
      .container { max-width: 680px; margin: 0 auto; padding: 24px; }
      .header { background:#0b5cff; color: #fff; padding: 12px 20px; border-radius:6px 6px 0 0 }
      .content { background: #fff; padding: 20px; border: 1px solid #e6e6e6; }
      .footer { font-size: 12px; color:#666; margin-top:12px }
      .btn { display:inline-block; padding:10px 14px; background:#0b5cff; color:#fff; text-decoration:none; border-radius:4px }
      table.summary { width:100%; border-collapse:collapse; margin-top:10px }
      table.summary td, table.summary th { padding:8px; border:1px solid #eee }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2 th:text="${title}">Notification</h2>
      </div>
      <div class="content" th:utext="${body}">
        <!-- body html goes here -->
      </div>
      <div class="footer">
        <p>Si vous n'êtes pas à l'origine de cette action, contactez le support.</p>
        <p>© GNS</p>
      </div>
    </div>
  </body>
</html>
