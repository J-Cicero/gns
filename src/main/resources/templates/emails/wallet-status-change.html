<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changement de statut du portefeuille</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; color: #333; }
        .container { max-width: 600px; margin:0 auto; background:#fff; padding:32px; border-radius:8px }
        .header{ text-align:center; margin-bottom:20px }
        .logo{ font-size:24px; color:#1e3a8a; font-weight:700 }
        .content{ line-height:1.6 }
        .footer{ margin-top:24px; font-size:12px; color:#888; text-align:center }
        .badge { display:inline-block; padding:6px 10px; border-radius:4px; color:#fff }
        .status-GELE { background:#e53935 }
        .status-BLOQUE { background:#9e9e9e }
        .status-ACTIF { background:#43a047 }
    </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">studCash</div>
    </div>
    <div class="content">
      <p>Bonjour <span th:text="${nom}">Utilisateur</span>,</p>

      <p>Le statut de votre portefeuille <strong th:text="${walletName}">Mon Portefeuille</strong> a été modifié.</p>

      <p>
        Statut précédent : <span th:text="${oldStatus}">ACTIF</span><br/>
        Nouveau statut : <span th:text="${newStatus}" th:classappend="' badge status-' + ${newStatus}">GELE</span>
      </p>

      <p th:if="${reason}">Motif : <span th:text="${reason}">Raison fournie</span></p>

      <p>Date : <span th:text="${date}">2026-05-25</span></p>

      <p>Si vous pensez qu'il s'agit d'une erreur, contactez le support.</p>
    </div>
    <div class="footer">
      <p>© 2026 studCash</p>
    </div>
  </div>
</body>
</html>
