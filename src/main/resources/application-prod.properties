# ==========================================
# PRODUCTION - Application Configuration
# ==========================================

# Database Configuration (PostgreSQL via Render/Railway)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.jwtSecret=${JWT_SECRET}
jwt.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# API Configuration
server.servlet.context-path=/api
app.api.base-url=/api
app.frontend.url=${FRONTEND_URL}

# Public URLs
app.public.urls=/users/**,/api/public/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/api-docs/**,/actuator/health,/actuator/info

# Server Configuration
server.port=8080

# Logging
logging.level.root=WARN
logging.level.com.backend.gns=INFO
logging.level.org.springframework.security=WARN
