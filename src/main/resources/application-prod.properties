spring.application.name=gns

# ===========================
# Datasource (Render PostgreSQL)
# Variables d'environnement définies dans Render Dashboard
# ===========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server — Render injecte automatiquement $PORT
server.port=${PORT:8080}
server.servlet.context-path=/api

# ===========================
# CORS — L'URL Vercel du frontend
# ===========================
app.cors.allowed-origins=${FRONTEND_URL:https://gns-front.vercel.app}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# API
app.frontend.url=${FRONTEND_URL:https://gns-front.vercel.app}
app.public.urls=/users/**,/api/public/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/api-docs/**,/actuator/health,/actuator/info

# ===========================
# Logging — production: moins verbose
# ===========================
logging.level.root=WARN
logging.level.com.backend.gns=INFO

# ===========================
# Cloudinary
# ===========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===========================
# Gemini AI
# ===========================
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# ===========================
# JWT
# ===========================
jwt.jwtSecret=${JWT_SECRET:}
jwt.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ===========================
# Email (Gmail SMTP)
# ===========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===========================
# Multipart
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
